name: Build and Deploy Blog

on:
  push:
    branches: ["main", "devel"]
  workflow_dispatch:

env:
  ID_ED25519: ${{ secrets.ID_ED25519 }}

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install

      - name: Build
        run: |
          bun run build

      - name: Deploy
        if: github.event_name == 'push' && (github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/main')
        run: |
          echo "$ID_ED25519" > id_ed25519
          chmod 600 id_ed25519
          sftp -o IdentityFile="./id_ed25519" -o "StrictHostKeyChecking=no" -b ./scripts/batchfile_sftp.txt cfg90a6nm_ssh@ssh.cfg90a6nm.service.one
          rm id_ed25519
